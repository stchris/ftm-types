Occupancy:
  label: "Occupancy"
  plural: "Occupancies"
  extends:
    - Interval
  matchable: false
  description: >
    The occupation of a position by a person for a specific period of time.
  featured:
    - holder
    - post
  required:
    - holder
    - post
  edge:
    source: holder
    label: holds
    target: post
    directed: true
    caption:
      - startDate
      - endDate
  temporalExtent:
    start:
      - startDate
      - declarationDate
      - date
    end:
      - endDate
  properties:
    holder:
      label: "Holder"
      reverse:
        name: positionOccupancies
        label: "Positions held"
      type: entity
      range: Person
    post:
      label: "Position occupied"
      reverse:
        name: occupancies
        label: "Position holders"
      type: entity
      range: Position
    declarationDate:
      label: "Declaration date"
      description: "If established by an asset declaration"
      type: date
      matchable: false
    constituency:
      # https://www.popoloproject.com/specs/membership.html#classes-and-properties
      label: "Constituency"
      description: "The geographic area/distict represented by the holder"
    politicalGroup:
      label: "Political group"
      description: "Caucus, faction or parliamentary group of the holder"
    status:
      label: "Status"
      examples:
        - current
        - ended
      type: string
