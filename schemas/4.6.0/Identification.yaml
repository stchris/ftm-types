Identification:
  label: "Identification"
  plural: "Identifications"
  description: >
    A form of identification associated with its holder and some issuing country. This
    can be used for national ID cards, voter enrollments, and similar instruments.
  extends:
    - Interval
  matchable: false
  featured:
    - number
    - country
    - type
    - holder
    - startDate
    - endDate
  required:
    - holder
    - number
  caption:
    - number
  properties:
    holder:
      label: "Identification holder"
      type: entity
      range: LegalEntity
      reverse:
        label: "Identifications"
        name: identification
    type:
      label: "Type"
      examples:
        - Passport
        - Driving license
    country:
      label: "Country"
      type: country
    number:
      label: "Document number"
      type: identifier
      maxLength: 64
    authority:
      label: "Authority"
      description: "Government body issuing the identification document"
