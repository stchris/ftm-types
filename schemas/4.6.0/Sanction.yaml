Sanction:
  label: Sanction
  plural: Sanctions
  description: "A sanction designation."
  extends:
    - Interval
  matchable: false
  featured:
    - entity
    - country
    - authority
    - program
    - startDate
  required:
    - entity
  caption:
    - program
  properties:
    entity:
      label: "Entity"
      reverse:
        name: sanctions
        label: "Sanctions"
      type: entity
      range: Thing
    authority:
      label: "Authority"
    authorityId:
      label: "Authority-issued identifier"
      # eg. OFAC IDs, FCDO IDs, etc.
      type: identifier
    unscId:
      label: "UN SC identifier"
      description: "Identifier issued by the UN Security Council for sanctions designations"
      type: identifier
      maxLength: 16
    program:
      label: "Program"
    programId:
      # This is a unique identifier for the program issued by OpenSanctions, but
      # could also be used for authority-issued IDs in other usage scenarios.
      label: "Program ID"
      type: identifier
      maxLength: 64
    programUrl:
      label: "Program URL"
      type: url
    provisions:
      label: "Scope of sanctions"
    status:
      label: "Status"
      examples:
        - Active
        - Inactive
        - Expired
        - Suspended
    duration:
      label: "Duration"
      type: number
    reason:
      label: "Reason"
      description: An explanation of the designation's justification.
      type: text
    country:
      label: "Country"
      type: country
    listingDate:
      label: "Listing date"
      description: "The date on which the designation is listed; distinct from the `startDate`, which is the date on which the designation goes into effect"
      type: date
