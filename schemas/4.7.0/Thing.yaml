Thing:
  # Kein Ding, digga, das Ding hat swing.
  # Root type of all entities that should be rendered in Aleph.
  abstract: true
  matchable: false
  featured:
    - name
    - country
  required:
    - name
  caption:
    - name
  properties:
    name:
      label: Name
      description: "The primary name of the entity"
      type: name
    alias:
      label: Alias
      description: "An alternative or secondary name"
      type: name
    previousName:
      label: Previous name
      description: "A former name of the entity"
      type: name
    weakAlias:
      label: Weak alias
      type: name
      description: "A relatively broad or generic alias that should not be used for matching in screening systems. It may still may be useful for identification purposes, particularly in confirming a possible match triggered by other identifier information."
      matchable: false
    country:
      label: Country
      description: "An association between the entity and a country that is not covered by a more specific property (e.g. `jurisdiction`, `birthCountry`, `mainCountry`)"
      type: country
    summary:
      label: Summary
      description: "A short one-liner description; see also `description`, `notes`"
      type: text
      # OS notes: discouraged in favor of `notes` in most cases.
    notes:
      label: Notes
      description: "Narrative description of the entity; see also `description`, `summary`"
      type: text
    description:
      label: Description
      description: "A longer description; see also `notes`, `summary`"
      type: text
      # OS notes: discouraged in favor of `notes` in most cases.
    sourceUrl:
      label: Source link
      description: "A deep link to a source website for the profile"
      type: url
      matchable: false
    publisher:
      label: "Publishing source"
      matchable: false
    publisherUrl:
      label: "Publishing source URL"
      type: url
      matchable: false
    alephUrl:
      label: Aleph URL
      type: url
      hidden: true
      matchable: false
    wikipediaUrl:
      label: Wikipedia Article
      type: url
    wikidataId:
      label: Wikidata ID
      type: identifier
      format: wikidata
      maxLength: 32
      examples:
        - Q7747
    keywords:
      label: Keywords
      description: "Plain text keywords provided for the entity; prefer more specific `type`, `status`, etc. as appropriate"
    topics:
      label: Topics
      description: "Controlled tags used to qualify the entity and associate it with a risk category"
      examples:
        - sanction
        - debarment
        - role.pep
      type: topic
    address:
      label: Address
      description: "A textual description of an address linked to the entity"
      type: address
    addressEntity:
      label: Address
      description: "A reference to an `Address` entity with structured place information"
      reverse:
        name: things
        label: "Located there"
      type: entity
      range: Address
    program: # Used by sanctions
      label: Program
      description: Regulatory program or sanctions list on which an entity is listed
    programId:
      # This is a unique identifier for the program issued by OpenSanctions, but
      # could also be used for authority-issued IDs in other usage scenarios.
      label: "Program ID"
      type: identifier
      maxLength: 64
      hidden: true
      matchable: false
    proof:
      label: Source document
      reverse:
        name: proven
        label: "Derived entities"
      type: entity
      range: Document
    indexText:
      # This is a leaked abstraction from aleph. The idea is to have some
      # additional text field that can be used to associate searchable text
      # with an entity. This will be removed as a property upon indexing so
      # that it can never be retrieved.
      label: Index text
      hidden: true
      type: text
    createdAt:
      label: "Created at"
      description: "The date on which the entity was created, not to be confused with an internal 'first saved'-style metadata field"
      type: date
      matchable: false
    modifiedAt:
      label: "Modified on"
      description: "The date on which the entity was modified, not to be confused with an internal 'last updated'-style metadata field"
      type: date
      matchable: false
    retrievedAt:
      label: "Retrieved on"
      description: "Retrieval date generated by a data gathering system, not to be confused with an internal 'first found'-style metadata field"
      type: date
      matchable: false
