Position:
  label: "Position"
  plural: "Positions"
  extends:
    - Thing
  matchable: true
  # cf. https://www.popoloproject.com/specs/post.html
  description: >
    A post, role or position within an organization or body.
    This describes a position one or more people may occupy
    and not the occupation of the post by a specific individual at a
    specific point in time (see `Occupancy`).
  featured:
    - name
    - country
    - subnationalArea
  caption:
    - name
  required:
    - name
  temporalExtent:
    start:
      - inceptionDate
    end:
      - dissolutionDate
  properties:
    organization:
      label: "Organization"
      type: entity
      reverse:
        name: positions
        label: Positions
      range: Organization
    inceptionDate:
      label: Inception date
      type: date
    dissolutionDate:
      label: Dissolution date
      type: date
    subnationalArea:
      label: Subnational area
      description: "The name or code of a subnational jurisdiction, only when the position is geographically limited. Prefer `Occupancy:constituency` where relevant."
      type: string
    numberOfSeats:
      label: Total number of seats
      type: number
